<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accrual World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --shell-body: #e6d2a8;
        --shell-shadow: #b8a07c;
        --shell-highlight: #f4e9c8;
        --shell-bezel: #1a0a3e;
        --shell-bezel-inner: #5a4630;
        --shell-led: #e07598;
        --shell-dpad: #5e3aa8;
        --shell-pill: #5a4630;
        --shell-btn-a: #f5cf5e;
        --shell-btn-a-shadow: #b8923e;
        --shell-btn-b: #e07598;
        --shell-btn-b-shadow: #a04a6a;
        --screen-bg: #10052e;
      }

      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(
          ellipse 70% 60% at 50% 40%,
          #4a3a8a 0%,
          #2a1a55 60%,
          #1a0a3e 100%
        );
        overflow: hidden;
        font-family: 'JetBrains Mono', monospace;
        color: #c5d4ff;
      }

      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.06) 0, transparent 50%),
          radial-gradient(circle at 70% 80%, rgba(245, 207, 94, 0.05) 0, transparent 60%);
        pointer-events: none;
      }

      #app {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .console {
        width: min(95vw, calc(95vh * 900 / 640));
        aspect-ratio: 900 / 640;
        background: var(--shell-body);
        border-radius: 40px 40px 60px 60px;
        border: 6px solid var(--shell-bezel);
        box-shadow:
          inset 0 -8px 0 var(--shell-shadow),
          inset 0 4px 0 var(--shell-highlight),
          0 30px 60px rgba(0, 0, 0, 0.5);
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 4% 6.2% 3.4%;
        gap: 1.2%;
        box-sizing: border-box;
      }

      .console-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .console-title {
        font-size: clamp(8px, 1.3vw, 13px);
        letter-spacing: 0.32em;
        color: var(--shell-bezel);
        font-weight: 700;
      }
      .console-top .right {
        display: flex;
        gap: 14px;
        align-items: center;
      }
      .palette-label {
        font-size: clamp(7px, 1.1vw, 11px);
        letter-spacing: 0.2em;
        color: var(--shell-bezel);
        opacity: 0.7;
      }
      .palette-chip {
        padding: 3px 10px;
        font-size: clamp(7px, 1.1vw, 11px);
        letter-spacing: 0.2em;
        background: var(--shell-bezel);
        color: var(--shell-highlight);
        border-radius: 4px;
      }
      .led {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--shell-led);
        box-shadow: 0 0 8px var(--shell-led), inset 0 0 0 1px var(--shell-bezel);
        animation: pp-power 1.6s ease-in-out infinite;
      }
      @keyframes pp-power {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.5; }
      }

      .bezel {
        background: var(--shell-bezel);
        border-radius: 14px;
        padding: 2.4%;
        position: relative;
        box-shadow: inset 0 4px 14px rgba(0, 0, 0, 0.5);
        display: grid;
        place-items: center;
      }
      .bezel-strip {
        position: absolute;
        top: 6px;
        left: 22px;
        right: 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(7px, 0.9vw, 9px);
        letter-spacing: 0.3em;
        color: var(--shell-highlight);
        opacity: 0.5;
      }
      #screen {
        width: 100%;
        height: 100%;
        aspect-ratio: 192 / 116;
        background: var(--screen-bg);
        border: 2px solid var(--shell-bezel-inner);
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 0 2px var(--shell-bezel);
        display: grid;
        place-items: center;
      }
      #screen canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .scanlines, .glare, .scan-band {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .scanlines {
        background: repeating-linear-gradient(
          0deg, transparent 0, transparent 3px,
          rgba(0, 0, 0, 0.18) 3px, rgba(0, 0, 0, 0.18) 4px
        );
        mix-blend-mode: multiply;
        opacity: 0.5;
      }
      .glare {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(255, 255, 255, 0) 22%,
          rgba(255, 255, 255, 0) 70%,
          rgba(255, 255, 255, 0.05) 100%
        );
      }
      .scan-band {
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(255, 255, 255, 0.05) 48%,
          rgba(255, 255, 255, 0.12) 50%,
          rgba(255, 255, 255, 0.05) 52%,
          transparent 100%
        );
        animation: pp-scan 6s linear infinite;
      }
      @keyframes pp-scan {
        from { transform: translateY(-100%); }
        to   { transform: translateY(100%); }
      }

      .console-bottom {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 1%;
      }

      .dpad {
        position: relative;
        width: clamp(64px, 9vw, 96px);
        height: clamp(64px, 9vw, 96px);
      }
      .dpad .horiz, .dpad .vert {
        position: absolute;
        background: var(--shell-bezel);
        border-radius: 6px;
        box-shadow: inset 0 -3px 0 var(--shell-bezel-inner);
      }
      .dpad .vert {
        left: 33.3%; top: 0; width: 33.4%; height: 100%;
      }
      .dpad .horiz {
        top: 33.3%; left: 0; height: 33.4%; width: 100%;
      }
      .dpad .arr {
        position: absolute;
        width: 0; height: 0;
      }
      .dpad .up    { top: 10%;    left: 50%; transform: translateX(-50%);
                     border-left: 8px solid transparent;
                     border-right: 8px solid transparent;
                     border-bottom: 9px solid var(--shell-dpad); }
      .dpad .down  { bottom: 10%; left: 50%; transform: translateX(-50%);
                     border-left: 8px solid transparent;
                     border-right: 8px solid transparent;
                     border-top: 9px solid var(--shell-dpad); }
      .dpad .left  { top: 50%;  left: 10%;  transform: translateY(-50%);
                     border-top: 8px solid transparent;
                     border-bottom: 8px solid transparent;
                     border-right: 9px solid var(--shell-dpad); }
      .dpad .right { top: 50%;  right: 10%; transform: translateY(-50%);
                     border-top: 8px solid transparent;
                     border-bottom: 8px solid transparent;
                     border-left: 9px solid var(--shell-dpad); }

      .middle {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .pills {
        display: flex;
        gap: 14px;
      }
      .pill {
        padding: 4px 14px;
        background: var(--shell-pill);
        border-radius: 999px;
        font-size: clamp(7px, 0.9vw, 9px);
        letter-spacing: 0.22em;
        color: var(--shell-highlight);
      }
      .device-caption {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(11px, 1.5vw, 15px);
        color: var(--shell-bezel);
        font-style: italic;
      }

      .ab {
        display: flex;
        align-items: center;
        gap: 14px;
        justify-self: end;
        transform: rotate(-16deg);
      }
      .btn-circle {
        width: clamp(36px, 4.6vw, 46px);
        height: clamp(36px, 4.6vw, 46px);
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: clamp(13px, 1.8vw, 17px);
        font-weight: 700;
        color: var(--shell-bezel);
      }
      .btn-a {
        background: var(--shell-btn-a);
        box-shadow: inset 0 -4px 0 var(--shell-btn-a-shadow), 0 2px 0 var(--shell-bezel);
      }
      .btn-b {
        background: var(--shell-btn-b);
        box-shadow: inset 0 -4px 0 var(--shell-btn-b-shadow), 0 2px 0 var(--shell-bezel);
      }

      .speaker {
        position: absolute;
        right: 7%;
        bottom: 10%;
        display: grid;
        grid-template-columns: repeat(6, 4px);
        gap: 4px;
        transform: rotate(-16deg);
        pointer-events: none;
      }
      .speaker span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--shell-bezel);
        opacity: 0.7;
      }

      .footer-caption {
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.34em;
        color: #8a8ee0;
        opacity: 0.6;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="console">
        <div class="console-top">
          <div class="console-title">HOME GARDEN · POCKET</div>
          <div class="right">
            <span class="palette-label">PALETTE</span>
            <span class="palette-chip">DAWN</span>
            <span class="led"></span>
          </div>
        </div>

        <div class="bezel">
          <div class="bezel-strip">
            <span>DOT MATRIX WITH STEREO SOUND</span>
            <span>PKT-1</span>
          </div>
          <div id="screen">
            <div class="scan-band"></div>
            <div class="scanlines"></div>
            <div class="glare"></div>
          </div>
        </div>

        <div class="console-bottom">
          <div class="dpad">
            <div class="vert"></div>
            <div class="horiz"></div>
            <div class="arr up"></div>
            <div class="arr down"></div>
            <div class="arr left"></div>
            <div class="arr right"></div>
          </div>
          <div class="middle">
            <div class="pills">
              <span class="pill">SELECT</span>
              <span class="pill">START</span>
            </div>
            <div class="device-caption">Sol 47 · Mira's plot</div>
          </div>
          <div class="ab">
            <div class="btn-circle btn-b">B</div>
            <div class="btn-circle btn-a">A</div>
          </div>
        </div>

        <div class="speaker">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div class="footer-caption">ACCRUAL WORLD · MILESTONE 1</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
